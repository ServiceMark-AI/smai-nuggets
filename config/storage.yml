test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

amazon:
  service: S3
  access_key_id: <%= ENV["AWS_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["AWS_SECRET_ACCESS_KEY"] %>
  region: <%= ENV["AWS_REGION"] %>
  bucket: <%= ENV["AWS_BUCKET"] %>

# Authentication: GCS_CREDENTIALS (entire JSON keyfile contents) is materialized
# to a tempfile by config/initializers/gcs_credentials.rb on boot, which sets
# GOOGLE_APPLICATION_CREDENTIALS so this service uses Application Default
# Credentials. On a developer machine, you can skip GCS_CREDENTIALS and run
# `gcloud auth application-default login` instead.
google:
  service: GCS
  project: <%= ENV["GCS_PROJECT"] %>
  bucket: <%= ENV["GCS_BUCKET"] %>

