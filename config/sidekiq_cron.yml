campaign_sweep:
  cron: "* * * * *"
  class: "CampaignSweepJob"
  queue: default
  description: "Sweeps approved active campaigns and sends due step emails. Runs every minute."

gmail_reply_poll:
  cron: "<%= Rails.env.development? ? '* * * * *' : '*/2 * * * *' %>"
  class: "GmailReplyPollJob"
  queue: default
  description: "Polls Gmail for customer replies on threads we've sent campaign emails on. Independent cadence from the send sweep so reply latency isn't bounded by send timing. Every minute in development; every 2 minutes elsewhere."
