# PostgreSQL. Versions 9.5 and up are supported.
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>


development:
  <<: *default
  database: app_development
  host: <%= ENV.fetch("DB_HOST", nil) %>
  username: <%= ENV.fetch("DB_USERNAME", nil) %>
  password: <%= ENV.fetch("DB_PASSWORD", nil) %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: app_test
  host: <%= ENV.fetch("DB_HOST", nil) %>
  username: <%= ENV.fetch("DB_USERNAME", nil) %>
  password: <%= ENV.fetch("DB_PASSWORD", nil) %>

# Production reads the full connection string from DATABASE_URL
# (set by Heroku Postgres). Solid Cache falls back to the primary
# connection automatically; Action Cable uses Redis (see cable.yml).
production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
